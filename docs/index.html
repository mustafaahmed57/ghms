<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Candlewood Hotel &amp; Suites Management System</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="GHMS">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="mobile-web-app-capable" content="yes">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #6366f1;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* Full-viewport iframe */
    #app-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: #f1f5f9;
    }

    /* Splash screen — hides once iframe fires load */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #f1f5f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      transition: opacity 0.4s ease;
    }
    .sp-icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 32px rgba(99,102,241,0.32);
    }
    .sp-name {
      font-size: 15px; font-weight: 700; color: #0f172a;
      text-align: center; max-width: 210px; line-height: 1.4;
    }
    .sp-sub { font-size: 12px; color: #94a3b8; margin-top: -8px; }
    .sp-dots { display: flex; gap: 6px; }
    .sp-dots span {
      width: 7px; height: 7px; border-radius: 50%; background: #6366f1;
      animation: spbounce 1.2s infinite ease-in-out;
    }
    .sp-dots span:nth-child(2) { animation-delay: .2s; }
    .sp-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes spbounce {
      0%,80%,100% { transform: scale(.55); opacity: .35; }
      40%          { transform: scale(1);   opacity: 1;   }
    }

    /* Offline banner */
    #offline-bar {
      display: none;
      position: fixed; top: 0; left: 0; right: 0; z-index: 10000;
      padding: 8px 16px;
      background: #f59e0b; color: white;
      font-size: 13px; font-weight: 600; text-align: center;
    }
  </style>
</head>
<body>

  <!-- Offline notice -->
  <div id="offline-bar">You are offline — reconnect to use live hotel data.</div>

  <!-- Splash screen -->
  <div id="splash">
    <div class="sp-icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white"
           stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </div>
    <div class="sp-name">Candlewood Hotel &amp; Suites</div>
    <div class="sp-sub">Management System</div>
    <div class="sp-dots"><span></span><span></span><span></span></div>
  </div>

  <!-- The actual GAS app -->
  <iframe
    id="app-frame"
    src="https://script.google.com/macros/s/AKfycbzp30YVrj8-YB0PtTRvmOXbD3_CHEtx7FrD9lZz1otny8lmCPOX0by0xMnMrHYgUmo2qw/exec"
    allow="fullscreen; clipboard-read; clipboard-write"
    title="GHMS Application">
  </iframe>

  <script>
    // ── Service Worker ─────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function(){});
    }

    // ── Splash ─────────────────────────────────────────────────
    var splashDone = false;
    function hideSplash() {
      if (splashDone) return;
      splashDone = true;
      var s = document.getElementById('splash');
      s.style.opacity = '0';
      setTimeout(function(){ s.style.display = 'none'; }, 420);
    }
    document.getElementById('app-frame').addEventListener('load', hideSplash);
    setTimeout(hideSplash, 10000); // fallback after 10 s

    // ── Offline / online ───────────────────────────────────────
    function setOffline(off) {
      document.getElementById('offline-bar').style.display = off ? 'block' : 'none';
    }
    window.addEventListener('offline', function(){ setOffline(true);  });
    window.addEventListener('online',  function(){ setOffline(false); });
    if (!navigator.onLine) setOffline(true);

    // ── Install prompt ─────────────────────────────────────────
    var _installPrompt = null;
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      _installPrompt = e;
      // Show a small install hint after 3 s if not dismissed before
      try { if (sessionStorage.getItem('ghms_install_dismissed')) return; } catch(e2){}
      setTimeout(showInstallHint, 3000);
    });
    window.addEventListener('appinstalled', function() {
      _installPrompt = null;
      hideInstallHint();
    });

    function showInstallHint() {
      if (!_installPrompt) return;
      if (document.getElementById('install-hint')) return;
      var bar = document.createElement('div');
      bar.id = 'install-hint';
      bar.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:10000;' +
        'background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;' +
        'display:flex;align-items:center;justify-content:space-between;' +
        'padding:12px 16px;font-family:-apple-system,sans-serif;font-size:13px;font-weight:500;';
      bar.innerHTML =
        '<span>&#8595; Install GHMS for quick access</span>' +
        '<div style="display:flex;gap:8px;">' +
        '<button onclick="doInstall()" style="background:rgba(255,255,255,0.22);color:white;border:1px solid rgba(255,255,255,0.4);border-radius:6px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;">Install</button>' +
        '<button onclick="hideInstallHint()" style="background:none;border:none;color:white;opacity:.65;font-size:18px;cursor:pointer;line-height:1;">&times;</button>' +
        '</div>';
      document.body.appendChild(bar);
    }
    function hideInstallHint() {
      var b = document.getElementById('install-hint');
      if (b) b.remove();
      try { sessionStorage.setItem('ghms_install_dismissed','1'); } catch(e2){}
    }
    function doInstall() {
      if (!_installPrompt) return;
      _installPrompt.prompt();
      _installPrompt.userChoice.then(function(c){
        _installPrompt = null;
        hideInstallHint();
      });
    }
  </script>
</body>
</html>
